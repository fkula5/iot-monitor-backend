networks:
  iot-net:
    driver: bridge

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: iot_db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    networks:
      - iot-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - iot-net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/auth
    container_name: auth_service
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${AUTH_SERVICE_DB_USER}
      DB_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
      AUTH_SERVICE_DB_NAME: ${AUTH_SERVICE_DB_NAME}
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      BCRYPT_COST: ${BCRYPT_COST}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iot-net
    ports:
      - "${AUTH_SERVICE_GRPC_PORT}:${AUTH_SERVICE_GRPC_PORT}"

  sensor-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/sensor-service
    container_name: sensor_service
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${SENSOR_SERVICE_DB_USER}
      DB_PASSWORD: ${SENSOR_SERVICE_DB_PASSWORD}
      SENSOR_SERVICE_DB_NAME: ${SENSOR_SERVICE_DB_NAME}
      SENSOR_SERVICE_GRPC_PORT: ${SENSOR_SERVICE_GRPC_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iot-net
    ports:
      - "${SENSOR_SERVICE_GRPC_PORT}:${SENSOR_SERVICE_GRPC_PORT}"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/api-gateway
    container_name: api_gateway
    env_file: .env
    environment:
      AUTH_SERVICE_GRPC_ADDR: ${AUTH_SERVICE_GRPC_ADDR}
      SENSOR_SERVICE_GRPC_ADDR: ${SENSOR_SERVICE_GRPC_ADDR}
      DATA_SERVICE_GRPC_ADDR: ${DATA_SERVICE_GRPC_ADDR}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    depends_on:
      - auth-service
      - sensor-service
      - data-processing-service
      - rabbitmq
    networks:
      - iot-net

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_HOST: ${NGINX_HOST}
      SSL_CERT: ${SSL_CERT}
      SSL_KEY: ${SSL_KEY}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - iot-net
    depends_on:
      - api-gateway

  data-processing-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/data-processing
    container_name: data_processing_service
    env_file: .env
    environment:
      DATA_SERVICE_GRPC_ADDR: ${DATA_SERVICE_GRPC_ADDR}
      DATA_SERVICE_GRPC_PORT: ${DATA_SERVICE_GRPC_PORT}
      DATA_SERVICE_DB_NAME: ${DATA_SERVICE_DB_NAME}
      DATA_SERVICE_DB_USER: ${DATA_SERVICE_DB_USER}
      DATA_SERVICE_DB_PASSWORD: ${DATA_SERVICE_DB_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iot-net
    ports:
      - "${DATA_SERVICE_GRPC_PORT}:${DATA_SERVICE_GRPC_PORT}"

  data-generation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/data-generation-service
    container_name: data_gen_service
    env_file: .env
    environment:
      SENSOR_SERVICE_GRPC_ADDR: ${SENSOR_SERVICE_GRPC_ADDR}
      DATA_SERVICE_GRPC_ADDR: ${DATA_SERVICE_GRPC_ADDR}
    depends_on:
      - sensor-service
      - data-processing-service
    networks:
      - iot-net

  alert-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/alert-service
    container_name: alert_service
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      ALERT_SERVICE_DB_USER: ${ALERT_SERVICE_DB_USER}
      ALERT_SERVICE_DB_PASSWORD: ${ALERT_SERVICE_DB_PASSWORD}
      ALERT_SERVICE_DB_NAME: ${ALERT_SERVICE_DB_NAME}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iot-net
    ports:
      - "50054:50054"

  alert-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/alert-dispatcher
    container_name: alert_dispatcher
    env_file: .env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      AUTH_SERVICE_GRPC_ADDR: ${AUTH_SERVICE_GRPC_ADDR}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - iot-net

volumes:
  postgres-data:
