basePath: /
definitions:
  handlers.AddSensorsRequest:
    properties:
      sensor_ids:
        items:
          type: integer
        type: array
    type: object
  handlers.CreateGroupRequest:
    properties:
      color:
        type: string
      description:
        type: string
      icon:
        type: string
      name:
        type: string
      sensor_ids:
        items:
          type: integer
        type: array
    type: object
  handlers.CreateSensorRequest:
    properties:
      description:
        type: string
      location:
        type: string
      name:
        type: string
      sensor_type_id:
        type: integer
    type: object
  handlers.SensorResponse:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      last_updated:
        type: string
      location:
        type: string
      name:
        type: string
      sensor_type:
        $ref: '#/definitions/handlers.SensorTypeResponse'
      updated_at:
        type: string
    type: object
  handlers.SensorTypeResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      manufacturer:
        type: string
      max_value:
        type: number
      min_value:
        type: number
      model:
        type: string
      name:
        type: string
      unit:
        type: string
    type: object
  handlers.StoreReadingRequest:
    properties:
      sensor_id:
        type: integer
      timestamp:
        type: string
      value:
        type: number
    type: object
  handlers.UpdateGroupRequest:
    properties:
      color:
        type: string
      description:
        type: string
      icon:
        type: string
      name:
        type: string
      sensor_ids:
        items:
          type: integer
        type: array
    type: object
  handlers.UpdateSensorRequest:
    properties:
      active:
        type: boolean
      description:
        type: string
      location:
        type: string
      name:
        type: string
      sensor_type_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/skni-kod/iot-monitor-backend
  description: API dla systemu monitorowania IoT.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: IoT Monitor API
  version: "1.0"
paths:
  /api/data/readings:
    post:
      consumes:
      - application/json
      description: Sends a sensor reading to the data processing service
      parameters:
      - description: Sensor Reading
        in: body
        name: reading
        required: true
        schema:
          $ref: '#/definitions/handlers.StoreReadingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Store a new sensor reading
      tags:
      - Data
  /api/data/readings/latest:
    get:
      description: Fetches the most recent reading for each specified sensor
      parameters:
      - description: Comma-separated sensor IDs
        in: query
        name: sensor_ids
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Get latest readings for multiple sensors
      tags:
      - Data
  /api/data/sensors/{sensor_id}/latest:
    get:
      description: Fetches the most recent N readings for a specific sensor
      parameters:
      - description: Sensor ID
        in: path
        name: sensor_id
        required: true
        type: integer
      - description: Number of readings to fetch (default 10)
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Get latest N readings for a single sensor
      tags:
      - Data
  /api/data/sensors/{sensor_id}/readings:
    get:
      description: Fetches historical data for a specific sensor
      parameters:
      - description: Sensor ID
        in: path
        name: sensor_id
        required: true
        type: integer
      - description: Start time (RFC3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC3339)
        in: query
        name: end_time
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: Get historical sensor readings
      tags:
      - Data
  /api/data/ws/readings:
    get:
      description: Establishes a WebSocket connection for real-time sensor data streaming
      parameters:
      - description: Comma-separated sensor IDs
        in: query
        name: sensor_ids
        type: string
      responses: {}
      summary: Stream sensor readings via WebSocket
      tags:
      - Data
  /api/sensor-groups:
    get:
      description: Get all sensor groups for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: List sensor groups
      tags:
      - SensorGroups
    post:
      consumes:
      - application/json
      description: Create a new sensor group
      parameters:
      - description: Group data
        in: body
        name: group
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create sensor group
      tags:
      - SensorGroups
  /api/sensor-groups/{id}:
    delete:
      description: Delete a sensor group
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete sensor group
      tags:
      - SensorGroups
    get:
      description: Get a specific sensor group with its sensors
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get sensor group
      tags:
      - SensorGroups
    put:
      consumes:
      - application/json
      description: Update an existing sensor group
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Group data
        in: body
        name: group
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update sensor group
      tags:
      - SensorGroups
  /api/sensor-groups/{id}/sensors:
    delete:
      consumes:
      - application/json
      description: Remove sensors from an existing group
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Sensor IDs
        in: body
        name: sensors
        required: true
        schema:
          $ref: '#/definitions/handlers.AddSensorsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Remove sensors from group
      tags:
      - SensorGroups
    post:
      consumes:
      - application/json
      description: Add sensors to an existing group
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Sensor IDs
        in: body
        name: sensors
        required: true
        schema:
          $ref: '#/definitions/handlers.AddSensorsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Add sensors to group
      tags:
      - SensorGroups
  /api/sensor-types:
    get:
      description: Get a list of all sensor types
      produces:
      - application/json
      responses:
        "200":
          description: List of sensor types
          schema:
            items:
              $ref: '#/definitions/handlers.SensorTypeResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: List Sensor Types
      tags:
      - SensorTypes
    post:
      consumes:
      - application/json
      description: Create a new sensor type
      parameters:
      - description: Sensor Type Data
        in: body
        name: sensorType
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create Sensor Type
      tags:
      - SensorTypes
  /api/sensor-types/{id}:
    delete:
      description: Delete a sensor type by ID
      parameters:
      - description: Sensor Type ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete Sensor Type
      tags:
      - SensorTypes
    get:
      description: Get details of a specific sensor type by ID
      parameters:
      - description: Sensor Type ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Sensor type details
          schema:
            $ref: '#/definitions/handlers.SensorTypeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get Sensor Type
      tags:
      - SensorTypes
    put:
      consumes:
      - application/json
      description: Update an existing sensor type by ID
      parameters:
      - description: Sensor Type ID
        in: path
        name: id
        required: true
        type: integer
      - description: Sensor Type Data
        in: body
        name: sensorType
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update Sensor Type
      tags:
      - SensorTypes
  /api/sensors:
    get:
      description: Fetches all sensors from the Sensor Service.
      produces:
      - application/json
      responses:
        "200":
          description: List of sensors
          schema:
            items:
              $ref: '#/definitions/handlers.SensorResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: ListSensors retrieves a list of all sensors.
      tags:
      - Sensors
    post:
      consumes:
      - application/json
      description: Creates a new sensor in the Sensor Service.
      parameters:
      - description: Sensor to create
        in: body
        name: sensor
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateSensorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created sensor details
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: CreateSensor creates a new sensor.
      tags:
      - Sensors
  /api/sensors/{id}:
    delete:
      description: Deletes a sensor from the Sensor Service by its ID.
      parameters:
      - description: Sensor ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: DeleteSensor deletes a sensor by ID.
      tags:
      - Sensors
    get:
      description: Fetches a sensor from the Sensor Service by its ID.
      parameters:
      - description: Sensor ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Sensor details
          schema:
            $ref: '#/definitions/handlers.SensorResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: GetSensor retrieves a sensor by ID.
      tags:
      - Sensors
    put:
      consumes:
      - application/json
      description: Updates an existing sensor in the Sensor Service.
      parameters:
      - description: Sensor ID
        in: path
        name: id
        required: true
        type: integer
      - description: Sensor fields to update
        in: body
        name: sensor
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateSensorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated sensor details
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: UpdateSensor updates an existing sensor.
      tags:
      - Sensors
  /api/sensors/{id}/activate:
    post:
      description: Marks a sensor as active in the Sensor Service.
      parameters:
      - description: Sensor ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Updated sensor details
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: SetSensorActive sets a sensor as active.
      tags:
      - Sensors
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password.
      parameters:
      - description: User credentials
        in: body
        name: credentials
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful
          schema:
            properties:
              expires_at:
                type: string
              token:
                type: string
              user:
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Login authenticates a user and returns a token.
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user with email, username, and password.
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          properties:
            email:
              type: string
            first_name:
              type: string
            last_name:
              type: string
            password:
              type: string
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            properties:
              expires_at:
                type: string
              token:
                type: string
              user:
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Register creates a new user account.
      tags:
      - Auth
  /auth/user:
    get:
      description: Get current user profile
      produces:
      - application/json
      responses:
        "200":
          description: User Profile
          schema:
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get User
      tags:
      - Auth
    put:
      consumes:
      - application/json
      description: Update current user profile
      parameters:
      - description: Update data
        in: body
        name: user
        required: true
        schema:
          properties:
            first_name:
              type: string
            last_name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated User
          schema:
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update Profile
      tags:
      - Auth
securityDefinitions:
  ApiKeyAuth:
    description: Wprowadź token JWT w formacie 'Bearer {token}'.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
