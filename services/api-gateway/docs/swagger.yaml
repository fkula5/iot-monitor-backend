paths:
  /api/alert-rules:
    get:
      consumes:
      - application/json
      description: Get a list of alert rules for the authenticated user with pagination
        support
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/types.PaginatedAlertRuleResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                error:
                  type: string
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                error:
                  type: string
              type: object
      summary: List Alert Rules
      tags:
      - Alert Rules
    post:
      consumes:
      - application/json
      description: Create a new alert rule for the authenticated user
      parameters:
      - description: Alert Rule Request
        in: body
        name: alertRule
        required: true
